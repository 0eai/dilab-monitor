<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="server-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulse-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg-gradient)"/>

  <!-- Server rack icon -->
  <g transform="translate(16, 14)">
    <!-- Server box 1 (top) -->
    <rect x="0" y="0" width="32" height="10" rx="2" fill="url(#server-gradient)" opacity="0.9"/>
    <circle cx="4" cy="5" r="1.5" fill="#10b981"/>
    <circle cx="9" cy="5" r="1.5" fill="#10b981"/>
    <rect x="14" y="3.5" width="14" height="3" rx="0.5" fill="#1e293b" opacity="0.3"/>

    <!-- Server box 2 (middle) -->
    <rect x="0" y="13" width="32" height="10" rx="2" fill="url(#server-gradient)" opacity="0.9"/>
    <circle cx="4" cy="18" r="1.5" fill="#10b981"/>
    <circle cx="9" cy="18" r="1.5" fill="#fbbf24"/>
    <rect x="14" y="16.5" width="14" height="3" rx="0.5" fill="#1e293b" opacity="0.3"/>

    <!-- Server box 3 (bottom) -->
    <rect x="0" y="26" width="32" height="10" rx="2" fill="url(#server-gradient)" opacity="0.9"/>
    <circle cx="4" cy="31" r="1.5" fill="#10b981"/>
    <circle cx="9" cy="31" r="1.5" fill="#10b981"/>
    <rect x="14" y="29.5" width="14" height="3" rx="0.5" fill="#1e293b" opacity="0.3"/>
  </g>

  <!-- Activity pulse indicator (top right) -->
  <g transform="translate(48, 12)">
    <circle cx="0" cy="0" r="6" fill="url(#pulse-gradient)" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="url(#pulse-gradient)"/>
    <circle cx="0" cy="0" r="2" fill="#d1fae5"/>
  </g>
</svg>
