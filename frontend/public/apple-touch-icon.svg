<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Apple touch icon needs more padding and simpler design -->
  <defs>
    <linearGradient id="app-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="app-server" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded background for iOS -->
  <rect width="180" height="180" rx="40" fill="url(#app-bg)"/>

  <!-- Larger server icon -->
  <g transform="translate(40, 35)">
    <!-- Server box 1 -->
    <rect x="0" y="0" width="100" height="30" rx="6" fill="url(#app-server)" opacity="0.9"/>
    <circle cx="12" cy="15" r="5" fill="#10b981"/>
    <circle cx="28" cy="15" r="5" fill="#10b981"/>
    <rect x="45" y="10" width="45" height="10" rx="2" fill="#1e293b" opacity="0.3"/>

    <!-- Server box 2 -->
    <rect x="0" y="38" width="100" height="30" rx="6" fill="url(#app-server)" opacity="0.9"/>
    <circle cx="12" cy="53" r="5" fill="#10b981"/>
    <circle cx="28" cy="53" r="5" fill="#fbbf24"/>
    <rect x="45" y="48" width="45" height="10" rx="2" fill="#1e293b" opacity="0.3"/>

    <!-- Server box 3 -->
    <rect x="0" y="76" width="100" height="30" rx="6" fill="url(#app-server)" opacity="0.9"/>
    <circle cx="12" cy="91" r="5" fill="#10b981"/>
    <circle cx="28" cy="91" r="5" fill="#10b981"/>
    <rect x="45" y="86" width="45" height="10" rx="2" fill="#1e293b" opacity="0.3"/>
  </g>

  <!-- Activity indicator -->
  <circle cx="150" cy="30" r="15" fill="#10b981" opacity="0.3"/>
  <circle cx="150" cy="30" r="10" fill="#10b981"/>
  <circle cx="150" cy="30" r="5" fill="#d1fae5"/>
</svg>
