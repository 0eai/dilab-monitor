# /etc/nginx/sites-available/node-monitor
# Node Monitor — Production Nginx config
# Domain: YOUR_DOMAIN (configure below)
#
# Setup:
#   1. Update server_name, ssl_certificate paths, and root path below
#   2. sudo cp nginx.conf /etc/nginx/sites-available/node-monitor
#   3. sudo ln -s /etc/nginx/sites-available/node-monitor /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d your-domain.com (if not already configured)
#   5. sudo nginx -t && sudo systemctl reload nginx

# ─── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/s;

# ─── Upstream backend ─────────────────────────────────────────────────────────
upstream node_monitor_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dilab2.ssu.ac.kr;  # ← CHANGE THIS

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    # Old Nginx syntax (pre-1.25) — http2 as listen parameter
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dilab2.ssu.ac.kr;  # ← CHANGE THIS

    # TLS — certbot will place these (update domain below)
    ssl_certificate     /etc/letsencrypt/live/dilab2.ssu.ac.kr/fullchain.pem;  # ← CHANGE THIS
    ssl_certificate_key /etc/letsencrypt/live/dilab2.ssu.ac.kr/privkey.pem;    # ← CHANGE THIS
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://$host ws://$host; img-src 'self' data:;" always;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/dilab-monitor.access.log;
    error_log  /var/log/nginx/dilab-monitor.error.log warn;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ── Frontend static files ─────────────────────────────────────────────────
    root /path/to/dilab-monitor/frontend/dist;  # ← CHANGE THIS to your deployment path
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache hashed Vite assets forever
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Auth — strict rate limit ──────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://dilab_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Terminal WebSocket ────────────────────────────────────────────────────
    location /api/terminal/attach {
        proxy_pass         http://dilab_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Metrics WebSocket ─────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://dilab_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ── General API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://dilab_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}